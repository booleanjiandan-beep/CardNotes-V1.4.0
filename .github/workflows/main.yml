
  
name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Locate Gradle project root
        run: |
          python - << 'PY'
          import os
          candidates = []
          for root, dirs, files in os.walk("."):
              rel = os.path.relpath(root, ".")
              depth = 0 if rel == "." else rel.count(os.sep) + 1
              if depth > 4:
                  dirs[:] = []
                  continue
              if any(f in files for f in ("settings.gradle.kts", "settings.gradle", "settings.gradle.dcl")):
                  candidates.append(rel)
          if not candidates:
              raise SystemExit("No Gradle project root found (missing settings.gradle*).")
          candidates.sort(key=lambda p: (0 if p == "." else 1, len(p)))
          chosen = candidates[0]
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as fp:
              fp.write(f"PROJECT_DIR={chosen}\n")
          print("Detected PROJECT_DIR =", chosen)
          PY

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 【新增步骤】如果仓库里没传 jar，这一步会强制生成它
      - name: Setup Gradle Wrapper
        working-directory: ${{ env.PROJECT_DIR }}
        run: gradle wrapper

      - name: Grant execute permission for gradlew
        working-directory: ${{ env.PROJECT_DIR }}
        run: chmod +x gradlew

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> $GITHUB_ENV

      - name: Build signed release APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: FreeNote-Release-APK
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
